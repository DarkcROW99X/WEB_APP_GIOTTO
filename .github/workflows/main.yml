name: Genera immagini.json

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  genera:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: python genera_json.py

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Aggiorna immagini.json
